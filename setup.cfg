# Configuration for flake8, kept here so that the settings are picked up
# automatically by anyone running "python -m flake8" and not just by CI.
[flake8]
# The copyright end year expected by our own H102 check. This is
# deliberately pinned rather than tracking the current year, so that the
# style checks don't start failing when the year rolls over. Bump this
# together with the copyright headers themselves.
copyright-end-year = 2022
# Don't lint build artifacts left behind by "pip install ." and friends.
extend-exclude = build,dist
