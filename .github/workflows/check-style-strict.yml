name: Run strict style checks

# This workflow reports copyright headers that are out of date with respect
# to the *current* year. Unlike the pinned check in the other workflows, it is
# expected to start failing when the year rolls over; it should therefore NOT
# be configured as a required check for merging, so that PRs aren't blocked
# until the headers (and the pinned year in setup.cfg) are updated.

on: [pull_request, workflow_dispatch]

jobs:
  strict-style:
    runs-on: 'ubuntu-latest'

    steps:
    - name: Clone the source
      uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install local package
      run: python -m pip install .
    - name: Report on out-of-date copyright end years
      # Override the year pinned in setup.cfg with the current year.
      run: python -m flake8 --select H102 --copyright-end-year current .
